<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aesthetic directions — preview</title>
<style>
  :root {
    --page-bg: #FAFAF7;
    --page-fg: #1A1A1A;
    --rule: #E5E2DA;
    --muted: #6B6B6B;
  }
  html, body { margin: 0; padding: 0; background: var(--page-bg); color: var(--page-fg); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  body { padding: 48px 32px 96px; max-width: 1100px; margin: 0 auto; }
  header.page { margin-bottom: 48px; }
  header.page h1 { font-size: 28px; margin: 0 0 8px; font-weight: 600; }
  header.page p  { color: var(--muted); margin: 0; }
  nav.toc { margin: 24px 0 48px; padding: 16px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); display: flex; flex-wrap: wrap; gap: 16px; }
  nav.toc a { color: var(--page-fg); text-decoration: none; border-bottom: 1px solid var(--rule); padding-bottom: 2px; font-size: 14px; }
  nav.toc a:hover { border-bottom-color: var(--page-fg); }
  section.direction { margin: 0 0 96px; padding-top: 24px; border-top: 2px solid var(--page-fg); }
  section.direction header h2 { font-size: 32px; margin: 0 0 6px; font-weight: 700; }
  section.direction header .adjectives { color: var(--muted); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 24px; }
  .block-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 32px 0 12px; }
  .swatch-row { display: flex; gap: 8px; align-items: stretch; min-height: 120px; }
  .swatch { flex: 1 1 auto; min-width: 60px; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end; font-size: 11px; line-height: 1.3; }
  .swatch .role { opacity: 0.85; }
  .swatch .hex  { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-weight: 600; }
  .swatch .pct  { font-weight: 700; font-size: 13px; margin-top: 2px; }
  .stacked-bar { height: 28px; border-radius: 4px; overflow: hidden; display: flex; margin-top: 16px; border: 1px solid var(--rule); }
  .stacked-bar > div { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
  .type-sample { padding: 24px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .type-sample .display { margin: 0 0 16px; line-height: 1.05; }
  .type-sample .body    { margin: 0 0 16px; line-height: 1.55; max-width: 60ch; }
  .type-sample .mono    { margin: 0; }
  .type-meta { color: var(--muted); font-size: 12px; font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; margin-top: 8px; }
  .hero, .manifesto { max-width: 70ch; line-height: 1.55; }
  .motion { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-size: 13px; color: var(--muted); }
</style>
<!-- Webfont links injected at runtime per direction -->
</head>
<body>
<header class="page">
  <h1>Aesthetic directions</h1>
  <p>Each section below is one direction. Compare palettes, color usage proportions, and live type. Pick one, combine two (e.g. "A+C"), reject all, or refine a specific one.</p>
</header>
<nav class="toc" id="toc"></nav>
<main id="directions"></main>

<script>
// --- DIRECTIONS_JSON ---
window.__DIRECTIONS = [];
// --- /DIRECTIONS_JSON ---

(function () {
  const directions = window.__DIRECTIONS || [];

  // Inject Google Fonts links (deduped)
  const seenHrefs = new Set();
  for (const d of directions) {
    for (const role of ["display", "body", "mono"]) {
      const t = d.typography && d.typography[role];
      if (t && t.googleFontsHref && !seenHrefs.has(t.googleFontsHref)) {
        seenHrefs.add(t.googleFontsHref);
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = t.googleFontsHref;
        document.head.appendChild(link);
      }
    }
  }

  const toc = document.getElementById("toc");
  const main = document.getElementById("directions");

  for (const d of directions) {
    const id = "dir-" + d.letter;
    const a = document.createElement("a");
    a.href = "#" + id;
    a.textContent = d.letter.toUpperCase() + " · " + d.name;
    toc.appendChild(a);

    const section = document.createElement("section");
    section.className = "direction";
    section.id = id;

    const adj = (d.adjectives || []).join(" · ");
    const palette = d.palette || [];
    const type = d.typography || {};
    const totalPct = palette.reduce((s, p) => s + (p.usagePercent || 0), 0) || 1;

    const swatches = palette.map(p => {
      const flex = (p.usagePercent || 0);
      const fg = pickReadableForeground(p.value);
      return `<div class="swatch" style="background:${p.value}; color:${fg}; flex-grow:${flex};">
        <div class="role">${escapeHtml(p.role || p.token || "")}</div>
        <div class="hex">${escapeHtml(p.value)}</div>
        <div class="pct">${flex}%</div>
      </div>`;
    }).join("");

    const bar = palette.map(p => {
      const fg = pickReadableForeground(p.value);
      const w = ((p.usagePercent || 0) / totalPct) * 100;
      return `<div style="background:${p.value}; color:${fg}; width:${w}%;">${(p.usagePercent || 0)}%</div>`;
    }).join("");

    const displayFamily = type.display ? cssFontStack(type.display.family) : "serif";
    const bodyFamily    = type.body    ? cssFontStack(type.body.family)    : "sans-serif";
    const monoFamily    = type.mono    ? cssFontStack(type.mono.family)    : "monospace";
    const displayWeight = type.display ? type.display.weight : 700;
    const bodyWeight    = type.body    ? type.body.weight    : 400;
    const displaySize   = type.display ? type.display.sizePx : 64;
    const bodySize      = type.body    ? type.body.sizePx    : 16;
    const monoSize      = type.mono    ? type.mono.sizePx    : 14;

    section.innerHTML = `
      <header>
        <h2>${escapeHtml(d.letter.toUpperCase())} · ${escapeHtml(d.name)}</h2>
        <p class="adjectives">${escapeHtml(adj)}</p>
      </header>

      <div class="block-label">Palette · sized by intended page usage</div>
      <div class="swatch-row">${swatches}</div>
      <div class="stacked-bar">${bar}</div>

      <div class="block-label">Typography</div>
      <div class="type-sample">
        <p class="display" style="font-family:${displayFamily}; font-weight:${displayWeight}; font-size:${displaySize}px;">The quick brown fox jumps over the lazy dog</p>
        <p class="body"    style="font-family:${bodyFamily}; font-weight:${bodyWeight}; font-size:${bodySize}px;">Body copy carries most of the message. It needs to feel comfortable at long lengths and inherit the personality of the direction without shouting. Read this paragraph as if it were the first thing on a marketing page or in a product surface.</p>
        <p class="mono"    style="font-family:${monoFamily}; font-size:${monoSize}px;">const direction = "${escapeHtml(d.letter)}"; // ${escapeHtml(d.name)}</p>
        <div class="type-meta">
          display: ${escapeHtml(type.display ? type.display.family : "—")} ${escapeHtml(String(displayWeight))} / ${displaySize}px ·
          body: ${escapeHtml(type.body ? type.body.family : "—")} ${escapeHtml(String(bodyWeight))} / ${bodySize}px ·
          mono: ${escapeHtml(type.mono ? type.mono.family : "—")} / ${monoSize}px
        </div>
      </div>

      <div class="block-label">Hero moment</div>
      <p class="hero">${escapeHtml(d.heroMoment || "")}</p>

      <div class="block-label">Motion</div>
      <p class="motion">${escapeHtml(d.motion || "")}</p>

      <div class="block-label">Manifesto</div>
      <p class="manifesto">${escapeHtml(d.manifesto || "")}</p>
    `;
    main.appendChild(section);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function cssFontStack(family) {
    return `"${family.replace(/"/g, '\\"')}", ui-sans-serif, system-ui, sans-serif`;
  }
  function pickReadableForeground(hex) {
    const m = /^#?([0-9a-f]{6}|[0-9a-f]{3})$/i.exec(hex || "");
    if (!m) return "#fff";
    let h = m[1];
    if (h.length === 3) h = h.split("").map(c => c + c).join("");
    const r = parseInt(h.slice(0, 2), 16) / 255;
    const g = parseInt(h.slice(2, 4), 16) / 255;
    const b = parseInt(h.slice(4, 6), 16) / 255;
    const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    return lum > 0.55 ? "#111" : "#fff";
  }
})();
</script>
</body>
</html>
